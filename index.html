<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiver</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(180deg, #f7f3ea, #e8dfcf);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
.card {
  background: white;
  padding: 25px;
  border-radius: 20px;
  width: 90%;
  max-width: 400px;
  text-align: center;
}
input, button {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
}
.hidden { display:none; }
</style>
</head>

<body>

<div class="card" id="auth">
  <h2>QUIVER</h2>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
</div>

<div class="card hidden" id="app">
  <h2>Daily Arrow</h2>
  <p id="verse"></p>
  <p id="ref"></p>
  <p id="reflection"></p>
  <button onclick="getDevotional()">New Arrow</button>
  <button onclick="logout()">Logout</button>
</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyAcUb8Mny9RYnXuKeK_-dO0AHdiIkhkFcg",
  authDomain: "quiver-web-fdce7.firebaseapp.com",
  projectId: "quiver-web-fdce7"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

function register() {
  auth.createUserWithEmailAndPassword(
    email.value, password.value
  ).then(()=>alert("Registered"));
}

function login() {
  auth.signInWithEmailAndPassword(
    email.value, password.value
  );
}

function logout() {
  auth.signOut();
}

auth.onAuthStateChanged(user=>{
  if(user){
    authDiv.style.display="none";
    app.style.display="block";
    getDevotional();
  } else {
    authDiv.style.display="block";
    app.style.display="none";
  }
});

function getDevotional(){
  db.collection("devotionals").get().then(snap=>{
    let docs = snap.docs;
    let rand = Math.floor(Math.random()*docs.length);
    let data = docs[rand].data();

    verse.innerText = data.verse;
    ref.innerText = data.reference;
    reflection.innerText = data.reflection;
  });
}

</script>

</body>
  </html>
